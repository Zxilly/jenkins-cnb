name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: Breaking changes
    labels: [breaking]
  - title: Features
    labels: [feature, enhancement]
  - title: Fixes
    labels: [bug, fix]
  - title: Maintenance
    labels: [dependencies, maintenance]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
version-resolver:
  major:
    labels: [breaking]
  minor:
    labels: [feature, enhancement]
  patch:
    labels: [bug, fix, dependencies, maintenance]
  default: patch
template: |
  ## Changes

  $CHANGES
